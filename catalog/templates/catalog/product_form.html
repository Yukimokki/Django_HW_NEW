{% extends 'catalog/base.html' %}
{% block content %}
<div class="container">
    <div class="row">
        <div class="col">
            <form class="row" method="post" enctype="multipart/form-data">
                  <div class="card">
                       <p class="card-text"> Are you sure to update {{ object.name }}? </p>
                      <div class="card-body">
                        {% csrf_token%}
                        {{form.as_p}}
                      </div>
                      <button type="submit" class="btn btn-primary my-2">Save</button>
                      <a class="btn btn-primary" href="{% url 'catalog:product_list'%}" role="button">Cancel</a>
                  </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
